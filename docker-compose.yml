version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: bno-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - bno-network

  app:
    build: .
    container_name: bno-app
    depends_on:
      - ollama
    volumes:
      - ./data:/app/data
      - ./frontend:/app/frontend
    ports:
      - "8000:8000"
      - "9000:9000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_PROVIDER=ollama
    networks:
      - bno-network
    restart: unless-stopped

volumes:
  ollama_data:

networks:
  bno-network:
    driver: bridge

